<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estado de Lineas PowerFrame</title>
  <link rel="icon" href="cl.png" type="image/png">
  <style>
    /* Hace que el iframe ocupe toda la pantalla de forma limpia */
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <!-- Se carga la aplicación web de Google Apps Script dentro de la página de GitHub -->
